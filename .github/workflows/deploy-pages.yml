name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build public site artifact
        run: |
          set -eu
          rm -rf dist
          mkdir -p dist

          cp index.html impressum.html datenschutz.html widerruf.html agb.html dist/
          cp styles.css script.js dist/
          cp -R assets dist/assets

          if [ -f .nojekyll ]; then
            cp .nojekyll dist/.nojekyll
          fi

          for optional in favicon.ico robots.txt site.webmanifest manifest.webmanifest browserconfig.xml; do
            if [ -f "$optional" ]; then
              cp "$optional" "dist/$optional"
            fi
          done

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
